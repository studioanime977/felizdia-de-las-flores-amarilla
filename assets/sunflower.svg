<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="centerGradient">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="petalGradient">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Pétalos -->
  <g transform="translate(150,150)">
    <!-- 12 pétalos en círculo -->
    <ellipse cx="0" cy="-60" rx="25" ry="50" fill="url(#petalGradient)" transform="rotate(0)" filter="url(#glow)" opacity="0.9"/>
    <ellipse cx="0" cy="-60" rx="25" ry="50" fill="url(#petalGradient)" transform="rotate(30)" filter="url(#glow)" opacity="0.9"/>
    <ellipse cx="0" cy="-60" rx="25" ry="50" fill="url(#petalGradient)" transform="rotate(60)" filter="url(#glow)" opacity="0.9"/>
    <ellipse cx="0" cy="-60" rx="25" ry="50" fill="url(#petalGradient)" transform="rotate(90)" filter="url(#glow)" opacity="0.9"/>
    <ellipse cx="0" cy="-60" rx="25" ry="50" fill="url(#petalGradient)" transform="rotate(120)" filter="url(#glow)" opacity="0.9"/>
    <ellipse cx="0" cy="-60" rx="25" ry="50" fill="url(#petalGradient)" transform="rotate(150)" filter="url(#glow)" opacity="0.9"/>
    <ellipse cx="0" cy="-60" rx="25" ry="50" fill="url(#petalGradient)" transform="rotate(180)" filter="url(#glow)" opacity="0.9"/>
    <ellipse cx="0" cy="-60" rx="25" ry="50" fill="url(#petalGradient)" transform="rotate(210)" filter="url(#glow)" opacity="0.9"/>
    <ellipse cx="0" cy="-60" rx="25" ry="50" fill="url(#petalGradient)" transform="rotate(240)" filter="url(#glow)" opacity="0.9"/>
    <ellipse cx="0" cy="-60" rx="25" ry="50" fill="url(#petalGradient)" transform="rotate(270)" filter="url(#glow)" opacity="0.9"/>
    <ellipse cx="0" cy="-60" rx="25" ry="50" fill="url(#petalGradient)" transform="rotate(300)" filter="url(#glow)" opacity="0.9"/>
    <ellipse cx="0" cy="-60" rx="25" ry="50" fill="url(#petalGradient)" transform="rotate(330)" filter="url(#glow)" opacity="0.9"/>
    
    <!-- Centro -->
    <circle cx="0" cy="0" r="35" fill="url(#centerGradient)"/>
    <!-- Textura del centro -->
    <circle cx="-10" cy="-10" r="3" fill="#654321" opacity="0.6"/>
    <circle cx="10" cy="-5" r="2" fill="#654321" opacity="0.6"/>
    <circle cx="0" cy="10" r="3" fill="#654321" opacity="0.6"/>
    <circle cx="-8" cy="8" r="2" fill="#654321" opacity="0.6"/>
    <circle cx="12" cy="8" r="2" fill="#654321" opacity="0.6"/>
    <circle cx="-5" cy="0" r="2" fill="#654321" opacity="0.6"/>
    <circle cx="8" cy="-10" r="3" fill="#654321" opacity="0.6"/>
  </g>
</svg>
