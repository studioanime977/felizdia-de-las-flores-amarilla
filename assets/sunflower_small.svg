<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="petalGradient2">
      <stop offset="0%" style="stop-color:#FFEB3B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFC107;stop-opacity:1" />
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Flor más pequeña y delicada -->
  <g transform="translate(100,100)">
    <!-- 8 pétalos -->
    <ellipse cx="0" cy="-40" rx="20" ry="35" fill="url(#petalGradient2)" transform="rotate(0)" filter="url(#softGlow)" opacity="0.85"/>
    <ellipse cx="0" cy="-40" rx="20" ry="35" fill="url(#petalGradient2)" transform="rotate(45)" filter="url(#softGlow)" opacity="0.85"/>
    <ellipse cx="0" cy="-40" rx="20" ry="35" fill="url(#petalGradient2)" transform="rotate(90)" filter="url(#softGlow)" opacity="0.85"/>
    <ellipse cx="0" cy="-40" rx="20" ry="35" fill="url(#petalGradient2)" transform="rotate(135)" filter="url(#softGlow)" opacity="0.85"/>
    <ellipse cx="0" cy="-40" rx="20" ry="35" fill="url(#petalGradient2)" transform="rotate(180)" filter="url(#softGlow)" opacity="0.85"/>
    <ellipse cx="0" cy="-40" rx="20" ry="35" fill="url(#petalGradient2)" transform="rotate(225)" filter="url(#softGlow)" opacity="0.85"/>
    <ellipse cx="0" cy="-40" rx="20" ry="35" fill="url(#petalGradient2)" transform="rotate(270)" filter="url(#softGlow)" opacity="0.85"/>
    <ellipse cx="0" cy="-40" rx="20" ry="35" fill="url(#petalGradient2)" transform="rotate(315)" filter="url(#softGlow)" opacity="0.85"/>
    
    <!-- Centro -->
    <circle cx="0" cy="0" r="25" fill="#8B4513"/>
    <circle cx="0" cy="0" r="20" fill="#A0522D"/>
  </g>
</svg>
